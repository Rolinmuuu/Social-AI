input {
    tcp {
        port => 5000
        codec => json
    }
}

filter {
    date {
        match => ["timestamp", "ISO8601"]
    }
}

output {
    elasticsearch {
        hosts => ["http://elasticsearch-logs:9200"]
        index => "socialai-%{+YYYY.MM.dd}"
    }
    stdout {
        codec => rubydebug
    }
}